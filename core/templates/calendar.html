{% extends "base.html" %}

{% load static %}

{% block title %}
Calendar
{% endblock %}

{% block extra_css %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">



{% endblock %}

{% block content %}

<div class="container mt-4">

    <h2 class="text-center mb-4">
        Schedule Saver
    </h2>

    <div class="calendar-nav">

        <button class="calendar-nav-btn active"
                data-target="default">

            Calendar

        </button>

        <button class="calendar-nav-btn"
                data-target="user">

            My Personal Calendar

        </button>

    </div>

    <div class="calendar-container swipe-enabled">

        <div class="calendar-wrapper swipe-enabled"
             id="calendarWrapper">

            <div class="calendar-view swipe-enabled">

                <div class="calendar-section">

                    <div id="defaultCalendar"></div>

                </div>

            </div>

            <div class="calendar-view swipe-enabled">

                <div class="calendar-section">

                    <div id="userCalendar"></div>

                </div>

            </div>

        </div>

    </div>

</div>


<!-- Add Reminder Modal -->

<div class="modal fade"
     id="reminderModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <form id="reminderForm">

                <div class="modal-header">

                    <h5 class="modal-title">

                        Add Reminder

                    </h5>

                    <button type="button"
                            class="btn-close"
                            data-bs-dismiss="modal">

                    </button>

                </div>

                <div class="modal-body">

                    <input type="hidden"
                           id="reminderDate">

                    <div class="mb-3">

                        <label class="form-label">

                            Reminder Title

                        </label>

                        <input type="text"
                               class="form-control"
                               id="reminderTitle"
                               required>

                    </div>

                </div>

                <div class="modal-footer">

                    <button type="submit"
                            class="btn btn-primary">

                        Add

                    </button>

                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">

                        Cancel

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script src="{% static 'js/calendaR.js' %}"></script>

<script src="{% static 'js/Dark.js' %}"></script>

{% endblock %}
