{% extends "base.html" %}
{% load static %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-graduation-cap"></i>
            <h3>Welcome Back</h3>
            <p>Login via Email to continue</p>
        </div>

        <form method="POST" novalidate class="login-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="email" class="form-label">
                    <i class="fas fa-envelope"></i>
                    Email Address
                </label>
                {{ form.email }}
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-paper-plane"></i>
                Send OTP
            </button>
        </form>
        
        <div class="login-footer">
            <p>Don't have an account? Enter your email and we'll create one for you.</p>
        </div>
    </div>
</div>

<style>
    /* Login Wrapper - Centers the card */
    .login-wrapper {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        animation: fadeIn 0.8s ease;
    }

    /* Login Card */
    .login-card {
        background: var(--card-gradient);
        border-radius: 24px;
        box-shadow: var(--shadow-heavy);
        border: 1px solid var(--border-color);
        width: 100%;
        max-width: 450px;
        padding: 2.5rem;
        transition: all 0.3s ease;
        animation: scaleIn 0.5s ease;
    }

    .login-card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-heavy);
    }

    /* Login Header */
    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .login-header i {
        font-size: 3.5rem;
        color: var(--primary-color);
        margin-bottom: 1rem;
        animation: bounce 2s infinite;
    }

    .login-header h3 {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--primary-dark);
        margin-bottom: 0.5rem;
    }

    .login-header p {
        color: var(--text-secondary);
        font-size: 0.95rem;
    }

    /* Form Styling */
    .login-form .form-group {
        margin-bottom: 1.5rem;
    }

    .login-form .form-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 600;
        color: var(--primary-dark);
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
    }

    .login-form .form-label i {
        color: var(--primary-color);
    }

    .login-form input[type="email"] {
        width: 100%;
        padding: 1rem 1.25rem;
        font-size: 1rem;
        border: 2px solid var(--border-color);
        border-radius: 12px;
        background: var(--bg-primary);
        color: var(--text-primary);
        transition: all 0.3s ease;
    }

    .login-form input[type="email"]:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(0, 71, 171, 0.2);
        transform: translateY(-2px);
    }

    .login-form input[type="email"]::placeholder {
        color: var(--text-secondary);
        opacity: 0.7;
    }

    /* Login Button */
    .btn-login {
        width: 100%;
        background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
        color: white;
        border: none;
        padding: 1rem;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        position: relative;
        overflow: hidden;
        box-shadow: var(--shadow-medium);
    }

    .btn-login::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.7s ease;
    }

    .btn-login:hover::before {
        left: 100%;
    }

    .btn-login:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-heavy);
    }

    .btn-login i {
        font-size: 1.1rem;
    }

    /* Login Footer */
    .login-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-color);
    }

    .login-footer p {
        color: var(--text-secondary);
        font-size: 0.9rem;
        line-height: 1.5;
    }

    /* Dark Mode Overrides */
    .dark-mode .login-header h3 {
        color: white !important;
    }

    .dark-mode .login-form .form-label {
        color: white !important;
    }

    .dark-mode .login-footer p {
        color: var(--text-secondary) !important;
    }

    /* Responsive */
    @media (max-width: 480px) {
        .login-wrapper {
            padding: 1rem;
        }

        .login-card {
            padding: 2rem 1.5rem;
        }

        .login-header i {
            font-size: 2.5rem;
        }

        .login-header h3 {
            font-size: 1.5rem;
        }

        .btn-login {
            padding: 0.875rem;
            font-size: 1rem;
        }
    }
</style>

{% endblock %}
