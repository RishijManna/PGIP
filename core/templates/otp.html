{% extends "base.html" %}
{% load static %}

{% block title %}
Verify OTP
{% endblock %}

{% block content %}

<div class="otp-wrapper">
    <div class="otp-card">
        <div class="otp-header">
            <i class="fas fa-shield-alt"></i>
            <h2>Verify OTP</h2>
            <p>Enter the 6-digit code sent to your email</p>
        </div>

        <form method="post" class="otp-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="otp" class="form-label">
                    <i class="fas fa-key"></i>
                    OTP Code
                </label>
                {{ form.otp }}
            </div>

            <button type="submit" class="btn-verify">
                <i class="fas fa-check-circle"></i>
                Verify & Login
            </button>
        </form>
        
        <div class="otp-footer">
            <p>Didn't receive the code?</p>
            <form method="post" action="{% url 'resend_otp' %}">
                {% csrf_token %}
                <button type="submit" class="resend-link otp-resend-button">
                    <i class="fas fa-rotate-right"></i>
                    Resend OTP
                </button>
            </form>
            <a href="{% url 'login' %}" class="resend-link">
                <i class="fas fa-arrow-left"></i>
                Back to Login
            </a>
        </div>
    </div>
</div>

<style>
    /* OTP Wrapper - Centers the card */
    .otp-wrapper {
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        animation: fadeIn 0.8s ease;
    }

    /* OTP Card */
    .otp-card {
        background: var(--card-gradient);
        border-radius: 24px;
        box-shadow: var(--shadow-heavy);
        border: 1px solid var(--border-color);
        width: 100%;
        max-width: 450px;
        padding: 2.5rem;
        transition: all 0.3s ease;
        animation: scaleIn 0.5s ease;
    }

    .otp-card:hover {
        transform: translateY(-5px);
        box-shadow: var(--shadow-heavy);
    }

    /* OTP Header */
    .otp-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .otp-header i {
        font-size: 3.5rem;
        color: var(--accent-color);
        margin-bottom: 1rem;
        animation: pulse 2s infinite;
    }

    .otp-header h2 {
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--primary-dark);
        margin-bottom: 0.5rem;
    }

    .otp-header p {
        color: var(--text-secondary);
        font-size: 0.95rem;
    }

    /* Form Styling */
    .otp-form .form-group {
        margin-bottom: 1.5rem;
    }

    .otp-form .form-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 600;
        color: var(--primary-dark);
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
    }

    .otp-form .form-label i {
        color: var(--accent-color);
    }

    .otp-form input[type="text"],
    .otp-form input[type="number"] {
        width: 100%;
        padding: 1rem 1.25rem;
        font-size: 1.5rem;
        text-align: center;
        letter-spacing: 8px;
        font-weight: 600;
        border: 2px solid var(--border-color);
        border-radius: 12px;
        background: var(--bg-primary);
        color: var(--text-primary);
        transition: all 0.3s ease;
    }

    .otp-form input[type="text"]:focus,
    .otp-form input[type="number"]:focus {
        outline: none;
        border-color: var(--accent-color);
        box-shadow: 0 0 0 3px rgba(76, 201, 240, 0.2);
        transform: translateY(-2px);
    }

    .otp-form input::placeholder {
        color: var(--text-secondary);
        opacity: 0.5;
        font-size: 1rem;
        letter-spacing: normal;
    }

    /* Verify Button */
    .btn-verify {
        width: 100%;
        background: linear-gradient(135deg, var(--accent-color), var(--accent-dark));
        color: white;
        border: none;
        padding: 1rem;
        border-radius: 12px;
        font-weight: 700;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        position: relative;
        overflow: hidden;
        box-shadow: var(--shadow-medium);
    }

    .btn-verify::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        transition: left 0.7s ease;
    }

    .btn-verify:hover::before {
        left: 100%;
    }

    .btn-verify:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-heavy);
    }

    .btn-verify i {
        font-size: 1.1rem;
    }

    /* OTP Footer */
    .otp-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid var(--border-color);
    }

    .otp-footer p {
        color: var(--text-secondary);
        font-size: 0.9rem;
        margin-bottom: 0.75rem;
    }

    .resend-link {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--primary-color);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        transition: all 0.3s ease;
    }

    .otp-resend-button {
        background: transparent;
        border: 0;
        cursor: pointer;
        margin-bottom: 0.75rem;
    }

    .resend-link:hover {
        color: var(--primary-dark);
        transform: translateX(-5px);
    }

    .resend-link i {
        font-size: 0.9rem;
    }

    /* Dark Mode Overrides */
    .dark-mode .otp-header h2 {
        color: white !important;
    }

    .dark-mode .otp-form .form-label {
        color: white !important;
    }

    .dark-mode .otp-footer p {
        color: var(--text-secondary) !important;
    }

    .dark-mode .resend-link {
        color: var(--accent-color) !important;
    }

    .dark-mode .resend-link:hover {
        color: white !important;
    }

    /* Responsive */
    @media (max-width: 480px) {
        .otp-wrapper {
            padding: 1rem;
        }

        .otp-card {
            padding: 2rem 1.5rem;
        }

        .otp-header i {
            font-size: 2.5rem;
        }

        .otp-header h2 {
            font-size: 1.5rem;
        }

        .otp-form input[type="text"],
        .otp-form input[type="number"] {
            font-size: 1.25rem;
            letter-spacing: 4px;
            padding: 0.875rem;
        }

        .btn-verify {
            padding: 0.875rem;
            font-size: 1rem;
        }
    }

    @keyframes pulse {
        0%, 100% {
            opacity: 1;
            transform: scale(1);
        }
        50% {
            opacity: 0.8;
            transform: scale(1.05);
        }
    }
</style>

{% endblock %}
